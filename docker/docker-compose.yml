version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pixshift
      POSTGRES_USER: pixshift
      POSTGRES_PASSWORD: pixshift_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixshift"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pixshift:pixshift_dev@db:5432/pixshift
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev_secret_key_change_in_production
      ENVIRONMENT: development
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      MAX_FILE_SIZE_MB: 10
      RATE_LIMIT_PER_HOUR: 100
      APP_VERSION: 1.0.0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../api:/app

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
